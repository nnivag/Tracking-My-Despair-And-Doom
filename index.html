<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>✨ Tracking My Shi ✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Pacifico&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'"/>
  <style>
    /* ── Pastel Pink & Sparkly Variables ─────────────────────────────────────── */
    :root {
      --bg:       #fff0f6; 
      --surface:  rgba(255, 255, 255, 0.85); /* Frosted Glass */
      --border:   rgba(255, 179, 224, 0.4);
      --accent:   #ffb3e0; 
      --accent2:  #ff85cc; 
      --accent3:  #e0c3fc; 
      --text:     #7a4962; 
      --muted:    #c299b0;
      --r:        16px;
    }

    /* ── Reset / Base ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Quicksand', sans-serif;
      min-height: 100vh;
      padding: 40px 20px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ── Dynamic Shimmer Background ────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      /* Layered gradients to create a "cloudy pink sky" look */
      background: 
        radial-gradient(circle at 10% 20%, #fff0f6 0%, transparent 40%),
        radial-gradient(circle at 90% 10%, #ffd1e6 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, #fff9fc 0%, transparent 70%),
        radial-gradient(circle at 80% 80%, #f3ebff 0%, transparent 50%),
        radial-gradient(circle at 20% 80%, #ffdef0 0%, transparent 40%);
      pointer-events: none;
      z-index: 0;
      animation: bgShimmer 15s ease-in-out infinite alternate;
    }

    @keyframes bgShimmer {
      0% { transform: scale(1); }
      100% { transform: scale(1.1); }
    }

    #sparkleCanvas {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    header, .input-row, .habits-wrap, .save-bar {
      position: relative;
      z-index: 2;
    }

    /* ── Header ────────────────────────────────────────────────────────────── */
    header {
      width: 100%; max-width: 860px;
      margin-bottom: 28px;
      display: flex; align-items: flex-end;
      justify-content: space-between;
      gap: 20px; flex-wrap: wrap;
    }

    h1 {
      font-family: 'Pacifico', cursive;
      font-size: clamp(2.2rem, 6vw, 3.6rem);
      background: linear-gradient(135deg, #ffb3e0, #ff85cc, #e0c3fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 15px rgba(255, 179, 224, 0.8));
      line-height: 1.1;
    }

    .tagline {
      font-size: .85rem; color: var(--muted);
      margin-top: 8px; font-weight: 700; letter-spacing: 0.05em;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
    }

    /* ── Stat Cards ────────────────────────────────────────────────────────── */
    .stats { display: flex; gap: 12px; flex-wrap: wrap; }

    .stat {
      background: var(--surface); 
      backdrop-filter: blur(8px);
      border: 2px solid var(--border);
      border-radius: var(--r); padding: 12px 18px;
      text-align: center; min-width: 90px;
      box-shadow: 0 8px 20px rgba(255, 179, 224, 0.2);
    }

    .stat .n {
      font-size: 1.8rem; font-weight: 700; line-height: 1;
      color: var(--accent2);
      filter: drop-shadow(0 0 8px #ffb3e0);
    }

    .stat .lbl { font-size: .65rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; font-weight: 700; }

    /* ── Save Bar ──────────────────────────────────────────────────────────── */
    .save-bar { width: 100%; max-width: 860px; margin-bottom: 12px; font-size: .75rem; text-align: right; font-weight: 700; color: var(--muted); }

    /* ── Input Row ─────────────────────────────────────────────────────────── */
    .input-row { display: flex; gap: 10px; width: 100%; max-width: 860px; margin-bottom: 28px; }

    .input-row input {
      flex: 1;
      background: var(--surface); border: 2px solid var(--border);
      border-radius: var(--r); color: var(--text);
      font-family: inherit; font-size: .95rem; font-weight: 600;
      padding: 14px 18px; outline: none;
      backdrop-filter: blur(8px);
      transition: all .2s ease;
    }
    .input-row input:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(255, 179, 224, 0.4); }

    .emoji-sel {
      background: var(--surface); border: 2px solid var(--border);
      border-radius: var(--r); padding: 0 12px; font-size: 1.2rem; cursor: pointer; outline: none;
    }

    .btn-add {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; border-radius: var(--r);
      font-weight: 700; padding: 12px 24px; cursor: pointer;
      box-shadow: 0 4px 15px rgba(255, 133, 204, 0.4);
      transition: all .2s ease;
    }
    .btn-add:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 133, 204, 0.6); }

    /* ── Habit Cards ───────────────────────────────────────────────────────── */
    .habits-wrap { width: 100%; max-width: 860px; display: flex; flex-direction: column; gap: 24px; }

    .habit-card {
      background: var(--surface); 
      backdrop-filter: blur(12px);
      border: 2px solid var(--border);
      border-radius: 24px; overflow: hidden;
      box-shadow: 0 15px 35px rgba(255, 222, 240, 0.6);
      animation: pop .4s cubic-bezier(.17,.67,.83,.67);
    }

    @keyframes pop { from { opacity: 0; transform: translateY(10px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

    .card-head {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 20px; border-bottom: 2px solid var(--border);
    }

    .hicon {
      width: 44px; height: 44px; border-radius: 12px;
      background: linear-gradient(135deg, #fff, #ffdef0);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; box-shadow: 0 4px 10px rgba(255, 179, 224, 0.3);
    }

    .btn-today {
      background: white; border: 2px solid #ffdef0;
      border-radius: 10px; color: var(--text);
      font-size: .85rem; font-weight: 700;
      padding: 8px 18px; cursor: pointer; transition: all 0.2s;
    }
    .btn-today.done-btn {
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border-color: var(--accent2); color: white;
      box-shadow: 0 0 15px rgba(255, 133, 204, 0.5);
    }

    /* ── Calendar Grid ─────────────────────────────────────────────────────── */
    .cal { padding: 20px; }
    .cal-month { color: #cc8ab1; font-weight: 800; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em;}

    .day {
      aspect-ratio: 1; border-radius: 10px;
      background: rgba(255, 255, 255, 0.5); border: 1px solid #ffebf5;
      cursor: pointer; position: relative;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .day:hover:not(.empty):not(.future) { background: #fff; transform: scale(1.1); z-index: 2; box-shadow: 0 0 10px var(--accent); }
    .day.checked {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-color: var(--accent2);
      box-shadow: 0 4px 12px rgba(255, 179, 224, 0.6);
    }
    .day.checked .dn { color: white; }
    .day.today { border: 2px solid var(--accent2) !important; }
    .day .dn { font-size: .65rem; font-weight: 700; color: #c299b0; position: absolute; bottom: 3px; right: 4px;}

  </style>
</head>
<body>

<canvas id="sparkleCanvas"></canvas>

<header>
  <div>
    <h1>✨ streak ✨</h1>
    <p class="tagline">Tracking My Shi (Ong Please Lock In)</p>
  </div>
  <div class="stats">
    <div class="stat"><div class="n" id="sHabits">0</div><div class="lbl">Habits</div></div>
    <div class="stat"><div class="n" id="sBest">0</div><div class="lbl">Best</div></div>
    <div class="stat"><div class="n" id="sToday">0</div><div class="lbl">Today</div></div>
  </div>
</header>

<div class="save-bar" id="saveBar"></div>

<div class="input-row">
  <input id="habitInput" type="text" maxlength="50" placeholder="Locked in? Type habit here..."/>
  <select id="habitEmoji" class="emoji-sel">
    <option>🌸</option><option>🎀</option><option>⭐</option><option>💖</option>
    <option>🍓</option><option>🧸</option><option>🌷</option><option>🦄</option>
  </select>
  <button class="btn-add" id="addBtn">+ Add ✨</button>
</div>

<div class="habits-wrap" id="habitsWrap"></div>

<script>
"use strict";

const canvas = document.getElementById('sparkleCanvas');
const ctx    = canvas.getContext('2d');
let sparks   = [];

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Lighter, glowier palette
const PINK_SPARKLES = ['#ffffff', '#fff0f6', '#ffdef0', '#ffb3e0', '#ffe3f2', '#ff85cc'];

function mkSpark(x, y, burst) {
  return {
    x:  x  ?? Math.random() * window.innerWidth,
    y:  y  ?? Math.random() * window.innerHeight,
    r:  Math.random() * 2.5 + 0.3,
    a:  Math.random(),
    da: (Math.random() * 0.015 + 0.002), 
    c:  PINK_SPARKLES[Math.floor(Math.random() * PINK_SPARKLES.length)],
    vx: burst ? (Math.random() - .5) * 10 : 0,
    vy: burst ? (Math.random() - .5) * 10 : 0,
    life: burst ? 1 : -1,
    angle: Math.random() * Math.PI * 2
  };
}

for (let i = 0; i < 180; i++) sparks.push(mkSpark());

function drawStar(s) {
  ctx.save();
  ctx.globalAlpha = s.life >= 0 ? s.life : s.a;
  ctx.fillStyle   = s.c;
  
  // High intensity glow settings
  ctx.shadowBlur = 10;
  ctx.shadowColor = s.c;
  ctx.globalCompositeOperation = 'lighter'; // This makes overlapping sparks glow brighter
  
  ctx.beginPath();
  // Draw small 4-pointed stars occasionally for extra sparkle
  if (s.r > 2) {
    for (let i = 0; i < 4; i++) {
        ctx.lineTo(s.x + Math.cos(s.angle + i * Math.PI / 2) * s.r * 2, 
                   s.y + Math.sin(s.angle + i * Math.PI / 2) * s.r * 2);
        ctx.lineTo(s.x + Math.cos(s.angle + i * Math.PI / 2 + Math.PI / 4) * s.r * 0.5, 
                   s.y + Math.sin(s.angle + i * Math.PI / 2 + Math.PI / 4) * s.r * 0.5);
    }
  } else {
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
  }
  
  ctx.fill();
  ctx.restore();
}

function animLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  sparks = sparks.filter(s => s.life < 0 || s.life > 0.01);
  for (const s of sparks) {
    if (s.life >= 0) {
      s.x += s.vx; s.y += s.vy; s.life -= 0.02;
      s.angle += 0.1;
      drawStar(s);
    } else {
      s.a += s.da;
      if (s.a > 0.8 || s.a < 0.1) s.da *= -1;
      drawStar(s);
    }
  }
  requestAnimationFrame(animLoop);
}
animLoop();

function burstAt(ex, ey) {
  for (let i = 0; i < 25; i++) sparks.push(mkSpark(ex, ey, true));
}

// ── App Logic ──────────────────────────────────────────────────────────────
const KEY = 'streak_habits_v4';
let habits = [];
let viewMonths = {};

async function loadData() {
  const raw = localStorage.getItem(KEY);
  if (raw) habits = JSON.parse(raw);
}

async function save() {
  localStorage.setItem(KEY, JSON.stringify(habits));
}

const DAYS_LBL = ['S','M','T','W','T','F','S'];
const MON_LBL  = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function pad(n) { return String(n).padStart(2, '0'); }
function today() { const d = new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }

function curStreak(h) {
  const t = today(); let n = 0, d = new Date();
  for (;;) {
    const s = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    if (!h.logs.includes(s)) { if (s === t) { d.setDate(d.getDate()-1); continue; } break; }
    n++; d.setDate(d.getDate()-1);
  }
  return n;
}

function bestStreak(h) {
  if (!h.logs.length) return 0;
  const s = [...h.logs].sort(); let best = 1, cur = 1;
  for (let i = 1; i < s.length; i++) {
    (new Date(s[i]) - new Date(s[i-1])) / 86400000 === 1 ? (cur++, best = Math.max(best, cur)) : (cur = 1);
  }
  return best;
}

function addHabit() {
  const inp = document.getElementById('habitInput');
  const name = inp.value.trim();
  if (!name) return;
  const emoji = document.getElementById('habitEmoji').value;
  habits.push({ id: Date.now().toString(), name, emoji, logs: [], createdAt: today() });
  inp.value = '';
  save(); render();
}

function toggleDay(hid, date, cellEl) {
  if (date > today()) return;
  const h = habits.find(x => x.id === hid);
  const i = h.logs.indexOf(date);
  if (i === -1) {
    h.logs.push(date);
    const r = cellEl.getBoundingClientRect();
    burstAt(r.left + r.width/2, r.top + r.height/2);
  } else { h.logs.splice(i, 1); }
  save(); render();
}

function logToday(hid) {
  const t = today();
  const h = habits.find(x => x.id === hid);
  const i = h.logs.indexOf(t);
  if (i === -1) { h.logs.push(t); burstAt(window.innerWidth/2, window.innerHeight/2); }
  else h.logs.splice(i, 1);
  save(); render();
}

function calHTML(h) {
  if (!viewMonths[h.id]) { const n = new Date(); viewMonths[h.id] = { y: n.getFullYear(), m: n.getMonth() }; }
  const { y, m } = viewMonths[h.id];
  const t = today();
  const fd = new Date(y, m, 1).getDay();
  const nd = new Date(y, m+1, 0).getDate();

  let labels = DAYS_LBL.map(d => `<div style="text-align:center; color:#c299b0; font-size:.65rem; font-weight:700;">${d}</div>`).join('');
  let cells = '<div class="empty"></div>'.repeat(fd);
  for (let d = 1; d <= nd; d++) {
    const date = `${y}-${pad(m+1)}-${pad(d)}`;
    cells += `<div class="day ${h.logs.includes(date)?'checked':''} ${date===t?'today':''} ${date>t?'future':''}" 
              onclick="toggleDay('${h.id}','${date}', this)"><span class="dn">${d}</span></div>`;
  }

  return `<div class="cal">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center;">
      <span class="cal-month">${MON_LBL[m]} ${y}</span>
      <div style="display:flex; gap:5px;">
        <button style="padding:2px 8px; border-radius:5px; border:1px solid #ffdef0; background:#fff; cursor:pointer;" onclick="viewMonths['${h.id}'].m--; render();">‹</button>
        <button style="padding:2px 8px; border-radius:5px; border:1px solid #ffdef0; background:#fff; cursor:pointer;" onclick="viewMonths['${h.id}'].m++; render();">›</button>
      </div>
    </div>
    <div style="display:grid; grid-template-columns:repeat(7, 1fr); margin-bottom:8px;">${labels}</div>
    <div style="display:grid; grid-template-columns:repeat(7, 1fr); gap:6px;">${cells}</div>
  </div>`;
}

function render() {
  const wrap = document.getElementById('habitsWrap');
  if (!habits.length) { wrap.innerHTML = `<div style="text-align:center; padding:60px;"><h2>🎀 Time to lock in?</h2><p>Add a habit to start.</p></div>`; updateStats(); return; }
  wrap.innerHTML = habits.map(h => `
    <div class="habit-card">
      <div class="card-head">
        <div style="display:flex; align-items:center; gap:12px;">
          <div class="hicon">${h.emoji}</div>
          <div><div class="hname">${h.name}</div><div class="hbadge">✨ ${curStreak(h)} day streak</div></div>
        </div>
        <div style="display:flex; gap:8px;">
          <button class="btn-today ${h.logs.includes(today())?'done-btn':''}" onclick="logToday('${h.id}')">${h.logs.includes(today())?'💖 LOCKED':'Lock In'}</button>
          <button style="background:none; border:none; color:#ffb3e0; cursor:pointer; font-size:1.2rem;" onclick="if(confirm('Delete?')) {habits=habits.filter(x=>x.id!=='${h.id}'); save(); render();}">✕</button>
        </div>
      </div>
      ${calHTML(h)}
    </div>
  `).join('');
  updateStats();
}

function updateStats() {
  document.getElementById('sHabits').textContent = habits.length;
  document.getElementById('sBest').textContent = habits.length ? Math.max(...habits.map(bestStreak)) : 0;
  document.getElementById('sToday').textContent = habits.filter(h => h.logs.includes(today())).length;
}

document.getElementById('addBtn').addEventListener('click', addHabit);
loadData().then(render);
</script>
</body>
</html>
