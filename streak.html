<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>✨ Streak Calendar ✨</title>
  <!-- font loads async so it never blocks render -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Pacifico&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'"/>
  <style>
    /* ── variables ─────────────────────────────────────────────────────────── */
    :root {
      --bg:       #1a0a14;
      --surface:  #2d1124;
      --surface2: #3a1830;
      --border:   #6d2f5a;
      --accent:   #ff6eb4;
      --accent2:  #ff9de2;
      --accent3:  #c94fae;
      --pink-lt:  #ffb3e0;
      --pink-hi:  #ff85cc;
      --text:     #ffe8f5;
      --muted:    #a06080;
      --r:        10px;
    }

    /* ── reset / base ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Quicksand', Georgia, sans-serif;
      min-height: 100vh;
      padding: 40px 20px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ── ambient glow (CSS only — no JS needed) ────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, #5c0a3a55 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, #8b0a5e44 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, #3a0a2a33 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* sparkle canvas sits behind content */
    #sparkleCanvas {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    /* everything content-level sits above canvas */
    header, .input-row, .habits-wrap, .save-bar {
      position: relative;
      z-index: 2;
    }

    /* ── header ────────────────────────────────────────────────────────────── */
    header {
      width: 100%; max-width: 860px;
      margin-bottom: 28px;
      display: flex; align-items: flex-end;
      justify-content: space-between;
      gap: 20px; flex-wrap: wrap;
    }

    h1 {
      font-family: 'Pacifico', cursive;
      font-size: clamp(2rem, 6vw, 3.4rem);
      background: linear-gradient(135deg, #ff6eb4, #ffb3e0, #ff9de2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 18px #ff6eb466);
      line-height: 1.1;
    }

    .tagline {
      font-size: .74rem; color: var(--muted);
      margin-top: 5px; letter-spacing: .12em; text-transform: uppercase;
    }

    /* ── stat cards ────────────────────────────────────────────────────────── */
    .stats { display: flex; gap: 12px; flex-wrap: wrap; }

    .stat {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 12px 20px;
      text-align: center; min-width: 86px;
      box-shadow: 0 0 12px #ff6eb422;
    }

    .stat .n {
      font-size: 1.8rem; font-weight: 700; line-height: 1;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat .lbl {
      font-size: .62rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: .1em; margin-top: 4px;
    }

    /* ── save bar ──────────────────────────────────────────────────────────── */
    .save-bar {
      width: 100%; max-width: 860px;
      margin-bottom: 12px; min-height: 18px;
      font-size: .72rem; text-align: right;
      letter-spacing: .05em; color: var(--muted);
      transition: color .3s;
    }
    .save-bar.saving { color: var(--accent2); }
    .save-bar.saved  { color: #ff9de2; }
    .save-bar.error  { color: #ffb3d1; }

    /* ── input row ─────────────────────────────────────────────────────────── */
    .input-row {
      display: flex; gap: 10px;
      width: 100%; max-width: 860px;
      margin-bottom: 28px;
    }

    .input-row input {
      flex: 1;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); color: var(--text);
      font-family: inherit; font-size: .95rem; font-weight: 600;
      padding: 12px 16px; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-row input::placeholder { color: var(--muted); }
    .input-row input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 14px #ff6eb433;
    }

    .emoji-sel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); color: var(--text);
      padding: 0 10px; font-size: 1.1rem; cursor: pointer; outline: none;
    }

    .btn-add {
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      color: #fff; border: none; border-radius: var(--r);
      font-family: inherit; font-size: .9rem; font-weight: 700;
      padding: 12px 22px; cursor: pointer; white-space: nowrap;
      box-shadow: 0 4px 20px #ff6eb455;
      transition: transform .1s, box-shadow .2s, opacity .15s;
    }
    .btn-add:hover  { transform: translateY(-2px); box-shadow: 0 6px 28px #ff6eb477; }
    .btn-add:active { transform: translateY(0); }

    /* ── habits list ───────────────────────────────────────────────────────── */
    .habits-wrap {
      width: 100%; max-width: 860px;
      display: flex; flex-direction: column; gap: 24px;
    }

    .habit-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      box-shadow: 0 4px 24px #ff6eb41a;
      animation: pop .3s cubic-bezier(.22,.68,0,1.2);
    }
    @keyframes pop {
      from { opacity: 0; transform: translateY(14px) scale(.98); }
      to   { opacity: 1; transform: none; }
    }

    .card-head {
      display: flex; align-items: center;
      justify-content: space-between; gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(90deg, #3a1830, #2d1124);
    }

    .head-left { display: flex; align-items: center; gap: 12px; }

    .hicon {
      width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; box-shadow: 0 2px 12px #ff6eb455;
    }

    .hname { font-size: 1.05rem; font-weight: 700; }
    .hbadge { font-size: .71rem; color: var(--muted); margin-top: 3px; }

    .head-right { display: flex; gap: 8px; align-items: center; }

    .btn-today {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: inherit; font-size: .8rem; font-weight: 700;
      padding: 7px 16px; cursor: pointer;
      transition: border-color .2s, color .2s, box-shadow .2s;
    }
    .btn-today:hover:not(.done-btn) {
      border-color: var(--accent); color: var(--accent);
      box-shadow: 0 0 10px #ff6eb433;
    }
    .btn-today.done-btn {
      background: linear-gradient(135deg, #5c0a3a, #3a0a2a);
      border-color: var(--accent); color: var(--accent);
      box-shadow: 0 0 12px #ff6eb444;
    }

    .btn-del {
      background: none; border: 1px solid var(--border);
      border-radius: 8px; color: var(--muted);
      padding: 6px 11px; font-size: .9rem; cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .btn-del:hover { border-color: #ffb3d1; color: #ffb3d1; }

    /* ── calendar ──────────────────────────────────────────────────────────── */
    .cal { padding: 18px 20px 22px; }

    .cal-nav {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 14px;
    }

    .cal-month {
      font-size: .78rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--accent2);
    }

    .cal-arrows { display: flex; gap: 6px; }

    .btn-nav {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--muted);
      padding: 3px 10px; font-size: 1rem; cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .btn-nav:hover { border-color: var(--accent); color: var(--accent); }

    .day-labels, .days-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px;
    }
    .day-labels { margin-bottom: 6px; }

    .dlbl {
      font-size: .59rem; color: var(--muted);
      text-align: center; text-transform: uppercase;
      letter-spacing: .06em; font-weight: 700;
    }

    .day {
      aspect-ratio: 1; border-radius: 8px;
      background: var(--surface2); border: 1px solid transparent;
      cursor: pointer; position: relative;
      display: flex; align-items: center; justify-content: center;
      transition: transform .12s, border-color .12s, box-shadow .12s;
    }
    .day:hover:not(.empty):not(.future) {
      border-color: var(--accent); transform: scale(1.12);
      z-index: 2; box-shadow: 0 0 14px #ff6eb466;
    }
    .day .dn {
      font-size: .6rem; font-weight: 700; color: var(--muted);
      position: absolute; top: 3px; right: 5px; line-height: 1;
    }
    .day.checked {
      background: linear-gradient(135deg, #ff6eb4, #c94fae);
      box-shadow: 0 0 10px #ff6eb466, inset 0 0 8px #ffffff22;
    }
    .day.checked .dn { color: #fff; }
    .day.checked::after {
      content: '✦';
      position: absolute; top: 1px; left: 3px;
      font-size: .5rem; color: #ffb3e099;
      animation: twinkle 2s ease-in-out infinite;
    }
    @keyframes twinkle {
      0%,100% { opacity: .4; transform: scale(.8); }
      50%      { opacity: 1;  transform: scale(1.2); }
    }
    .day.today  { border-color: var(--pink-hi) !important; }
    .day.today .dn { color: var(--pink-hi); }
    .day.future { opacity: .25; cursor: not-allowed; }
    .day.empty  { background: transparent; cursor: default; border: none; }

    /* tooltip */
    .day[data-tip]:hover::before {
      content: attr(data-tip);
      position: absolute; bottom: calc(100% + 6px); left: 50%;
      transform: translateX(-50%);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--accent2); font-size: .6rem; font-weight: 700;
      white-space: nowrap; padding: 3px 8px; border-radius: 6px;
      pointer-events: none; z-index: 10;
    }

    /* burst overlay */
    .burst {
      position: absolute; inset: 0; border-radius: inherit; pointer-events: none;
      background: radial-gradient(circle, #ffb3e088, #ff6eb455, transparent);
      animation: burstOut .4s ease forwards;
    }
    @keyframes burstOut {
      from { transform: scale(1); opacity: 1; }
      to   { transform: scale(3); opacity: 0; }
    }

    /* ── empty state ───────────────────────────────────────────────────────── */
    .empty-state {
      text-align: center; padding: 70px 20px; color: var(--muted);
    }
    .empty-state .ei {
      font-size: 3.5rem; margin-bottom: 14px;
      filter: drop-shadow(0 0 16px #ff6eb466);
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }
    .empty-state h2 { font-size: 1.3rem; color: var(--accent2); margin-bottom: 8px; }
    .empty-state p  { font-size: .8rem; }
  </style>
</head>
<body>

<canvas id="sparkleCanvas"></canvas>

<header>
  <div>
    <h1>✨ streak ✨</h1>
    <p class="tagline">your daily habit tracker · sparkle edition</p>
  </div>
  <div class="stats">
    <div class="stat"><div class="n" id="sHabits">0</div><div class="lbl">Habits</div></div>
    <div class="stat"><div class="n" id="sBest">0</div><div class="lbl">Best Streak</div></div>
    <div class="stat"><div class="n" id="sToday">0</div><div class="lbl">Done Today</div></div>
  </div>
</header>

<div class="save-bar" id="saveBar"></div>

<div class="input-row">
  <input id="habitInput" type="text" maxlength="50"
    placeholder="New habit — e.g. Read 30 min, Drink water, Meditate…"/>
  <select id="habitEmoji" class="emoji-sel">
    <option>✨</option><option>🌸</option><option>💖</option><option>🦋</option>
    <option>🌺</option><option>📚</option><option>🏃</option><option>🧘</option>
    <option>💧</option><option>🎀</option><option>🌙</option><option>🌷</option>
    <option>💪</option><option>🎯</option><option>🍓</option><option>🦄</option>
  </select>
  <button class="btn-add" id="addBtn">+ Add ✨</button>
</div>

<div class="habits-wrap" id="habitsWrap"></div>

<script>
"use strict";

// ── sparkles ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('sparkleCanvas');
const ctx    = canvas.getContext('2d');
let sparks   = [];

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const PINK = ['#ff6eb4','#ffb3e0','#ff9de2','#ffffff','#c94fae','#ff85cc'];

function mkSpark(x, y, burst) {
  return {
    x:  x  ?? Math.random() * window.innerWidth,
    y:  y  ?? Math.random() * window.innerHeight,
    r:  Math.random() * 1.8 + 0.4,
    a:  Math.random(),
    da: (Math.random() * 0.01 + 0.004) * (Math.random() < .5 ? 1 : -1),
    c:  PINK[Math.floor(Math.random() * PINK.length)],
    vx: burst ? (Math.random() - .5) * 6 : 0,
    vy: burst ? (Math.random() - .5) * 6 : 0,
    life: burst ? 1 : -1
  };
}

for (let i = 0; i < 110; i++) sparks.push(mkSpark());

function drawStar(x, y, r, alpha, color) {
  ctx.save();
  ctx.globalAlpha = Math.max(0, Math.min(1, alpha)) * .75;
  ctx.fillStyle   = color;
  ctx.shadowBlur  = 7;
  ctx.shadowColor = color;
  ctx.beginPath();
  for (let i = 0; i < 8; i++) {
    const a   = (i * Math.PI) / 4;
    const rad = i % 2 === 0 ? r * 2.5 : r * .9;
    i === 0
      ? ctx.moveTo(x + rad * Math.cos(a), y + rad * Math.sin(a))
      : ctx.lineTo(x + rad * Math.cos(a), y + rad * Math.sin(a));
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function animLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  sparks = sparks.filter(s => s.life < 0 || s.life > 0);
  for (const s of sparks) {
    if (s.life >= 0) {
      s.x += s.vx; s.y += s.vy; s.life -= 0.03;
      drawStar(s.x, s.y, s.r, s.life, s.c);
    } else {
      s.a += s.da;
      if (s.a > 1 || s.a < 0) s.da *= -1;
      drawStar(s.x, s.y, s.r, s.a, s.c);
    }
  }
  requestAnimationFrame(animLoop);
}
animLoop();   // start after everything is defined

function burstAt(ex, ey) {
  for (let i = 0; i < 14; i++) sparks.push(mkSpark(ex, ey, true));
}

// ── persistence ───────────────────────────────────────────────────────────────
const KEY = 'streak_habits_v3';
let habits     = [];
let viewMonths = {};
let saveTimer  = null;

async function loadData() {
  // Option A: Artifact cloud storage (Claude.ai published artifacts)
  if (window.storage) {
    try {
      const r = await window.storage.get(KEY);
      if (r && r.value) {
        habits = JSON.parse(r.value);
        setBar('✦ Habits loaded!', 'saved');
        setTimeout(() => setBar(''), 2000);
        return;
      }
    } catch (_) {}
  }
  // Option B: localStorage (VS Code Live Server / any local browser)
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) habits = JSON.parse(raw);
  } catch (_) {}
}

async function save() {
  setBar('saving…', 'saving');
  const json = JSON.stringify(habits);
  let ok = false;
  if (window.storage) {
    try { if (await window.storage.set(KEY, json)) ok = true; } catch (_) {}
  }
  try { localStorage.setItem(KEY, json); ok = true; } catch (_) {}
  setBar(ok ? '✦ Saved!' : '⚠ Could not save', ok ? 'saved' : 'error');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => setBar(''), 2000);
}

function setBar(msg, cls = '') {
  const el = document.getElementById('saveBar');
  el.textContent = msg;
  el.className   = 'save-bar ' + cls;
}

// ── dates ─────────────────────────────────────────────────────────────────────
const DAYS_LBL = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MON_LBL  = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];

function pad(n)  { return String(n).padStart(2, '0'); }
function today() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function ds(y, m, d) { return `${y}-${pad(m+1)}-${pad(d)}`; }

// ── streak math ───────────────────────────────────────────────────────────────
function curStreak(h) {
  const t = today(); let n = 0, d = new Date();
  for (;;) {
    const s = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    if (!h.logs.includes(s)) { if (s === t) { d.setDate(d.getDate()-1); continue; } break; }
    n++; d.setDate(d.getDate()-1);
  }
  return n;
}
function bestStreak(h) {
  if (!h.logs.length) return 0;
  const s = [...h.logs].sort(); let best = 1, cur = 1;
  for (let i = 1; i < s.length; i++) {
    (new Date(s[i]) - new Date(s[i-1])) / 86400000 === 1 ? (cur++, best = Math.max(best, cur)) : (cur = 1);
  }
  return best;
}

// ── actions ───────────────────────────────────────────────────────────────────
function addHabit() {
  const inp = document.getElementById('habitInput');
  const name = inp.value.trim();
  if (!name) { inp.focus(); return; }
  const emoji = document.getElementById('habitEmoji').value;
  const id    = Date.now().toString();
  const now   = new Date();
  habits.push({ id, name, emoji, logs: [], createdAt: today() });
  viewMonths[id] = { y: now.getFullYear(), m: now.getMonth() };
  inp.value = '';
  save();
  render();
}

function delHabit(id) {
  if (!confirm('Delete this habit? 💔')) return;
  habits = habits.filter(h => h.id !== id);
  delete viewMonths[id];
  save();
  render();
}

function toggleDay(hid, date, cellEl) {
  if (date > today()) return;
  const h = habits.find(x => x.id === hid);
  if (!h) return;
  const i = h.logs.indexOf(date);
  if (i === -1) {
    h.logs.push(date);
    if (cellEl) {
      const r = cellEl.getBoundingClientRect();
      burstAt(r.left + r.width/2, r.top + r.height/2);
      const b = document.createElement('div');
      b.className = 'burst';
      cellEl.appendChild(b);
      setTimeout(() => b.remove(), 420);
    }
  } else {
    h.logs.splice(i, 1);
  }
  save();
  render();
}

function logToday(hid) {
  const t = today();
  const h = habits.find(x => x.id === hid);
  if (!h) return;
  const i = h.logs.indexOf(t);
  if (i === -1) h.logs.push(t); else h.logs.splice(i, 1);
  save();
  render();
}

function shiftMonth(hid, d) {
  const vm = viewMonths[hid]; if (!vm) return;
  vm.m += d;
  if (vm.m > 11) { vm.m = 0; vm.y++; }
  if (vm.m < 0)  { vm.m = 11; vm.y--; }
  render();
}

// ── calendar HTML ──────────────────────────────────────────────────────────────
function calHTML(h) {
  if (!viewMonths[h.id]) {
    const n = new Date();
    viewMonths[h.id] = { y: n.getFullYear(), m: n.getMonth() };
  }
  const { y, m } = viewMonths[h.id];
  const t  = today();
  const fd = new Date(y, m, 1).getDay();
  const nd = new Date(y, m+1, 0).getDate();

  let rows = DAYS_LBL.map(d => `<div class="dlbl">${d}</div>`).join('');
  let cells = '<div class="empty"></div>'.repeat(fd);
  for (let d = 1; d <= nd; d++) {
    const date    = ds(y, m, d);
    const checked = h.logs.includes(date);
    const isToday = date === t;
    const future  = date > t;
    let cls = 'day';
    if (checked) cls += ' checked';
    if (isToday) cls += ' today';
    if (future)  cls += ' future';
    if (!future) cls = cls; // always has tip unless future
    const tip = future ? '' : `data-tip="${date}"`;
    cells += `<div class="${cls}" ${tip}
      onclick="handleCell(event,'${h.id}','${date}')">
      <span class="dn">${d}</span>
    </div>`;
  }

  return `<div class="cal">
    <div class="cal-nav">
      <span class="cal-month">🌸 ${MON_LBL[m]} ${y}</span>
      <div class="cal-arrows">
        <button class="btn-nav" onclick="shiftMonth('${h.id}',-1)">‹</button>
        <button class="btn-nav" onclick="shiftMonth('${h.id}',1)">›</button>
      </div>
    </div>
    <div class="day-labels">${rows}</div>
    <div class="days-grid">${cells}</div>
  </div>`;
}

function handleCell(e, hid, date) { toggleDay(hid, date, e.currentTarget); }

// ── render ────────────────────────────────────────────────────────────────────
function render() {
  const wrap = document.getElementById('habitsWrap');
  const t    = today();

  if (!habits.length) {
    wrap.innerHTML = `<div class="empty-state">
      <div class="ei">🌸</div>
      <h2>No habits yet!</h2>
      <p>Add your first habit above and start sparkling ✨</p>
    </div>`;
    updateStats();
    return;
  }

  wrap.innerHTML = '';
  for (const h of habits) {
    const streak = curStreak(h);
    const logged = h.logs.includes(t);
    const card   = document.createElement('div');
    card.className = 'habit-card';
    card.innerHTML = `
      <div class="card-head">
        <div class="head-left">
          <div class="hicon">${h.emoji}</div>
          <div>
            <div class="hname">${esc(h.name)}</div>
            <div class="hbadge">✨ ${streak} day streak · ${h.logs.length} total</div>
          </div>
        </div>
        <div class="head-right">
          <button class="btn-today ${logged ? 'done-btn' : ''}" onclick="logToday('${h.id}')">
            ${logged ? '💖 Done!' : '+ Today'}
          </button>
          <button class="btn-del" onclick="delHabit('${h.id}')">✕</button>
        </div>
      </div>
      ${calHTML(h)}`;
    wrap.appendChild(card);
  }
  updateStats();
}

function updateStats() {
  const t = today();
  document.getElementById('sHabits').textContent = habits.length;
  document.getElementById('sBest').textContent   = habits.length ? Math.max(...habits.map(bestStreak)) : 0;
  document.getElementById('sToday').textContent  = habits.filter(h => h.logs.includes(t)).length;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── wire up ───────────────────────────────────────────────────────────────────
document.getElementById('addBtn').addEventListener('click', addHabit);
document.getElementById('habitInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addHabit();
});

// ── boot ──────────────────────────────────────────────────────────────────────
(async () => {
  try {
    await loadData();
  } catch (e) {
    console.warn('loadData error:', e);
  }
  render();
})();
</script>
</body>
</html>
